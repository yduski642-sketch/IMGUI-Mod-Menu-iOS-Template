name: Build iOS Tweak

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          if [ ! -d "~/theos" ]; then
            git clone --recursive https://github.com/theos/theos.git ~/theos
          fi
          echo "THEOS=~/theos" >> $GITHUB_ENV

      - name: Setup SDK
        run: |
          mkdir -p ~/theos/sdks
          git clone https://github.com/theos/sdks.git temp_sdks
          cp -r temp_sdks/* ~/theos/sdks/
          rm -rf temp_sdks

      - name: Build Tweak
        run: |
          export THEOS=~/theos
          make package FINALPACKAGE=1 || true
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iOS-Mod-Menu
          path: packages/*.dylib
