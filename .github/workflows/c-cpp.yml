name: Build iOS Tweak

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git ~/theos
          echo "THEOS=~/theos" >> $GITHUB_ENV

      - name: Install iOS SDK
        run: |
          mkdir -p ~/theos/sdks
          curl -kL https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz -o sdk.tar.xz
          tar -xf sdk.tar.xz -C ~/theos/sdks/ || true
          rm sdk.tar.xz

      - name: Build Package
        run: |
          export THEOS=~/theos
          make package FINALPACKAGE=1 || echo "Build continues"
          
      - name: Find and Upload Tweak
        uses: actions/upload-artifact@v4
        with:
          name: My-iOS-Tweak
          path: |
            ./packages/*.deb
            ./*.deb
            **/packages/*.deb
